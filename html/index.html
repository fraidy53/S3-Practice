<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>샘플 페이지</title>
	<style>
		body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
		.container { max-width: 600px; margin: 60px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 32px; }
		h1 { color: #2d8cf0; }
		p { color: #333; }
		.btn { display: inline-block; margin-top: 20px; padding: 10px 24px; background: #2d8cf0; color: #fff; border: none; border-radius: 4px; text-decoration: none; font-size: 16px; }
		.btn:hover { background: #1a6fb3; }
	</style>
</head>
<body>
	<div class="container">
		<h1>안녕하세요!</h1>
		<p>이것은 샘플 HTML 페이지입니다.<br>아무거나 요청하셔서 만들어드렸어요 😊</p>
		<a href="https://www.naver.com" class="btn" target="_blank">네이버로 이동</a>
	</div>
</body>
</html>
